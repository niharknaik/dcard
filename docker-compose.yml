services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dcard-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dcard}
      MYSQL_USER: ${DB_USERNAME:-dcard}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - dcard-mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  queue:
    image: dcard-backend
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - app
      - mysql

  scheduler:
    image: dcard-backend
    restart: unless-stopped
    working_dir: /var/www/html
    # Runs the Laravel scheduler loop (analytics:aggregate, subscriptions:check).
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - app
      - mysql

volumes:
  dcard-mysql:
